<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Muleta Axilar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f0f4f4; padding: 40px 20px; }

    .produto {
      max-width: 500px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      border: 1px solid #dde;
    }

    .produto img {
      width: 250px;
      height: 250px;
      object-fit: contain;
      border-radius: 8px;
      background: #eef5f5;
    }

    .produto h2 { margin-top: 16px; color: #1a3a3a; }
    .produto p  { margin-top: 10px; color: #555; font-size: 14px; line-height: 1.6; }
    .produto .preco { margin-top: 16px; font-size: 22px; font-weight: bold; color: #1a7a4a; }

    .btn-comprar {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 32px;
      background: #1a7a4a;
      color: #fff;
      border-radius: 20px;
      text-decoration: none;
      font-size: 15px;
    }
    .btn-comprar:hover { background: #145e38; }

    .voltar {
      display: block;
      margin-top: 16px;
      font-size: 13px;
      color: #4aabab;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="produto">
    <img src="img/melueta.jpg" alt="Muleta Axilar">
    <h2>Muleta Axilar</h2>
    <p>Muleta axilar resistente, regulável em altura, com ponteira antiderrapante. Ideal para apoio e reabilitação.</p>
    <div class="preco">R$ 89,90</div>
    <a href="#" class="btn-comprar">Comprar agora</a>
    <a href="index.html" class="voltar">← Voltar para a loja</a>
  </div>
</body>
</html>
