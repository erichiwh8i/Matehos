<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="img/download.png" type="image/x-icon">
    <title>Matehos</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0A1F44;
            --green: #1a7a4a;
            --light-green: #e8f5ee;
            --bg: #f0f4f4;
            --card: #ffffff;
            --text: #1a3a3a;
            --muted: #6b7c7c;
            --border: #dde4e4;
            --shadow: rgba(10, 31, 68, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .produto {
            max-width: 460px;
            width: 100%;
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow:
                0 4px 6px rgba(10, 31, 68, 0.04),
                0 20px 60px rgba(10, 31, 68, 0.12);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Image area */
        .produto-img-wrap {
            background: linear-gradient(135deg, #eef5f5 0%, #e0eeea 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 36px;
            position: relative;
        }

        .produto-img-wrap::after {
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
        }

        .produto img {
            width: 220px;
            height: 220px;
            border-radius: 12px;
        }
        /* Badge */
        .badge {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--green);
            color: white;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* Content area */
        .produto-body {
            padding: 28px 32px 32px;
            text-align: center;
        }

        .produto-category {
            font-size: 11px;
            font-weight: 600;
            color: var(--green);
            margin-bottom: 8px;
        }

        .produto h2 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            line-height: 1.3;
            margin-bottom: 10px;
        }

        .produto p {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.65;
            max-width: 340px;
            margin: 0 auto;
        }

        /* Divider */
        .divider {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, var(--navy), var(--green));
            border-radius: 2px;
            margin: 18px auto;
        }

        /* Price */
        .preco-wrap {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 6px;
            margin-bottom: 22px;
        }

        .preco-prefix {
            font-size: 14px;
            font-weight: 500;
        }

        .preco {
            font-size: 32px;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
            letter-spacing: -0.5px;
        }

        /* Buttons */
        .acoes {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-comprar {
            display: block;
            padding: 14px 32px;
            color: white;
            border-radius: 12px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.01em;
            transition: all 0.25s ease;
            box-shadow: 0 4px 14px rgba(10, 31, 68, 0.25);
            position: relative;
            background-color: #0d2a5e;
            overflow: hidden;
        }

        .btn-comprar:hover {
            background: #0d2a5e;
            box-shadow: 0 8px 24px rgba(10, 31, 68, 0.32);
            color: white;
        }

        .btn-comprar:active {
            transform: translateY(0);
        }

        .voltar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 11px;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            text-decoration: none;
            border-radius: 10px;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        .voltar:hover {
            color: var(--navy);
            border-color: var(--navy);
            background: rgba(10, 31, 68, 0.03);
        }

        .voltar svg {
            transition: transform 0.2s ease;
        }

        .voltar:hover svg {
            transform: translateX(-3px);
        }
    </style>
</head>

<body>
    <div class="produto">
        <div class="produto-img-wrap">
            <img src="img/bota.jpg" alt="Guincho Elevador">
            <span class="badge">Disponível</span>
        </div>

        <div class="produto-body">
            <p class="produto-category">Equipamentos de Mobilidade</p>
            <h2>Bota Imobilizadora</h2>
            <p>Bota Imobilizadora Comfort Curta Hidrolight</p>

            <div class="divider"></div>

            <div class="preco-wrap">
                <span class="preco-prefix">R$</span>
                <span class="preco">29,90</span>
            </div>

            <div class="acoes">
                <a href="#" class="btn-comprar">Comprar agora</a>
                <a href="index.html" class="voltar">
                    Voltar para a loja
                </a>
            </div>
        </div>
    </div>
</body>

</html>
